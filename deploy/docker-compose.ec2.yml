# ── Gossiptoon V2 – EC2 Docker Compose ────────────────────────────────────────
# Usage (from project root after generating .env):
#   docker compose -f deploy/docker-compose.ec2.yml up --build -d
#
# Required .env file next to this compose file (see ec2-first-setup.sh):
#   REDDIT_CLIENT_ID, REDDIT_CLIENT_SECRET, GOOGLE_API_KEY
#   FRONTEND_URL          e.g. http://gossiptoon.duckdns.org:3000
#   NEXT_PUBLIC_API_URL   e.g. http://gossiptoon.duckdns.org:8000
# ------------------------------------------------------------------------------

services:

  # ── Python FastAPI backend ───────────────────────────────────────────────────
  gossiptoon-api:
    build:
      context: ../backend
      dockerfile: Dockerfile.ec2
    container_name: gossiptoon-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - FRONTEND_URL=${FRONTEND_URL}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - REDDIT_USER_AGENT=gossiptoon/2.0
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=gemini-2.5-flash
      - DEBUG=False
    volumes:
      - gossiptoon-cache:/app/cache
      - gossiptoon-data:/app/data
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  gossiptoon-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.ec2
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: gossiptoon-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      gossiptoon-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "0.5"

volumes:
  gossiptoon-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/gossiptoon/cache
  gossiptoon-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/gossiptoon/data
