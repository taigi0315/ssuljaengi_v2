# ── Gossiptoon V2 – Deploy to EC2 ─────────────────────────────────────────────
# Trigger: push to main branch
#
# Required GitHub Secrets:
#   EC2_HOST              Public IP or hostname of your EC2 instance
#   EC2_SSH_KEY           Private SSH key (PEM, begins with -----BEGIN RSA...)
#   REDDIT_CLIENT_ID      Reddit API client ID
#   REDDIT_CLIENT_SECRET  Reddit API client secret
#   GOOGLE_API_KEY        Google Gemini API key
# ------------------------------------------------------------------------------

name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/ssuljaengi_v2

            # Pull latest code
            git pull origin main

            # Generate deploy/.env with secrets
            cat > deploy/.env <<EOF
            REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }}
            REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }}
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            FRONTEND_URL=http://${{ secrets.EC2_HOST }}:3000
            NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_HOST }}:8000
            EOF

            # Rebuild and restart containers
            docker compose -f deploy/docker-compose.ec2.yml down
            docker compose -f deploy/docker-compose.ec2.yml up --build -d

            # Show running containers
            docker compose -f deploy/docker-compose.ec2.yml ps
