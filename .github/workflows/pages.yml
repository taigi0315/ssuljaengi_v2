# ── Gossiptoon V2 – Deploy Frontend to GitHub Pages ───────────────────────────
# Trigger: push to main branch (frontend files only)
#
# Required GitHub Secrets:
#   EC2_PUBLIC_IP   Public IP / hostname of your EC2 instance (e.g. 1.2.3.4)
#                   The frontend will call http://<EC2_PUBLIC_IP>:8000 for the API.
#
# The workflow builds a static Next.js export and publishes it to the
# gh-pages branch.  Enable GitHub Pages in repo Settings → Pages →
# "Deploy from a branch" → branch: gh-pages / root.
# ------------------------------------------------------------------------------

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_STATIC_EXPORT: 'true'
          # Point the frontend at the EC2 backend
          NEXT_PUBLIC_API_URL: http://${{ secrets.EC2_PUBLIC_IP }}:8000
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/out
          publish_branch: gh-pages
